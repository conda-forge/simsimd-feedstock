{% set name = "numkong" %}
{% set version = "7.3.0" %}

package:
  name: numkong-with-alias
  version: {{ version }}

source:
  url: https://github.com/ashvardanian/NumKong/archive/v{{ version }}.tar.gz
  sha256: 3e99b4741c2f8f9c4b8fffdaa69ea03c8e3d3fc8b1abdb4d01a329b6715ea84a

build:
  number: 0

outputs:
  - name: numkong
    build:
      script: python -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      build:
        - python                                 # [build_platform != target_platform]
        - cross-python_{{ target_platform }}     # [build_platform != target_platform]
        - {{ compiler('c') }}
        - {{ stdlib("c") }}
        - llvm-openmp                    # [osx]
        - libgomp                        # [linux]
      host:
        - python
        - setuptools
        - wheel
        - pip
        - llvm-openmp                    # [osx]
        - libgomp                        # [linux]
      run:
        - python
        - _openmp_mutex

    test:
      requires:
        - pip
      imports:
        - numkong
      commands:
        - pip check

  - name: simsimd
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage(name, exact=True) }}
    test:
      requires:
        - python
      imports:
        - numkong

about:
  home: https://github.com/ashvardanian/NumKong
  summary: Portable mixed-precision BLAS-like vector math library for x86 and ARM
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mukhery
