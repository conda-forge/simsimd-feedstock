{% set name = "numkong" %}
{% set version = "6.5.13" %}

package:
  name: numkong-with-alias
  version: {{ version }}

source:
  url: https://github.com/ashvardanian/NumKong/archive/v{{ version }}.tar.gz
  sha256: 74750ba40239ea946b8da25969585daf7816bcd70b31ae8a97c0357aa440805d

build:
  number: 0

outputs:
  - name: numkong
    build:
      script: python -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ stdlib("c") }}
        - llvm-openmp                    # [osx]
        - libgomp                        # [linux]
      host:
        - python
        - setuptools
        - wheel
        - pip
        - llvm-openmp                    # [osx]
        - libgomp                        # [linux]
      run:
        - python
        - _openmp_mutex
        
    test:
      requires:
        - pip
      imports:
        - numkong
      commands:
        - pip check

  - name: simsimd
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage(name, exact=True) }}
    test:
      requires:
        - python {{ python_min }}
      imports:
        - numkong  

about:
  home: https://github.com/ashvardanian/NumKong
  summary: Portable mixed-precision BLAS-like vector math library for x86 and ARM
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mukhery
