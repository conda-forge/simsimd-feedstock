{% set name = "NumKong" %}
{% set version = "6.5.0" %}

package:
  name: numkong-with-alias
  version: {{ version }}

source:
  url: https://github.com/ashvardanian/NumKong/archive/v{{ version }}.tar.gz
  sha256: 940bb1819329a785f96f4b709fceb33e1a5beb749a029e9943e430f9859fe7b2

build:
  number: 1

outputs:
  - name: numkong
    build:
      noarch: python
      script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ stdlib("c") }}
        - llvm-openmp                    # [osx]
        - libgomp                        # [linux]
      host:
        - python
        - setuptools
        - wheel
        - pip
        - llvm-openmp                    # [osx]
        - libgomp                        # [linux]
      run:
        - python
        
    test:
      requires:
        - pip
      imports:
        - numkong
      commands:
        - pip check

  - name: simsimd
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage(name, exact=True) }}
    test:
      requires:
        - python {{ python_min }}
      imports:
        - numkong  

about:
  home: https://github.com/ashvardanian/NumKong
  summary: Portable mixed-precision BLAS-like vector math library for x86 and ARM
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mukhery
