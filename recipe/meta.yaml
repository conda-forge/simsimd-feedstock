{% set name = "numkong" %}
{% set version = "7.2.4" %}

package:
  name: numkong-with-alias
  version: {{ version }}

source:
  url: https://github.com/ashvardanian/NumKong/archive/v{{ version }}.tar.gz
  sha256: 52e5fdfc80c9433848ce17b534adab84b09259b3456249511a754aba6451ca02

build:
  number: 0

outputs:
  - name: numkong
    build:
      script: python -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      build:
        - python                                 # [build_platform != target_platform]
        - cross-python_{{ target_platform }}     # [build_platform != target_platform]
        - {{ compiler('c') }}
        - {{ stdlib("c") }}
        - llvm-openmp                    # [osx]
        - libgomp                        # [linux]
      host:
        - python
        - setuptools
        - wheel
        - pip
        - llvm-openmp                    # [osx]
        - libgomp                        # [linux]
      run:
        - python
        - _openmp_mutex

    test:
      requires:
        - pip
      imports:
        - numkong
      commands:
        - pip check

  - name: simsimd
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage(name, exact=True) }}
    test:
      requires:
        - python
      imports:
        - numkong

about:
  home: https://github.com/ashvardanian/NumKong
  summary: Portable mixed-precision BLAS-like vector math library for x86 and ARM
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mukhery
